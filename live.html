<style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@300;400;500;600;700;800&display=swap");
:root{--brand-50:#f7f6f1;--brand-100:#ece9dd;--brand-300:#c2b893;--brand-500:#8a7d52;--brand-700:#554d33;--brand-900:#35301d;--cream-50:#faf9f7;--cream-100:#f5f4f0;--cream-300:#e6e3da;--cream-500:#b8b3a3;--cream-700:#807a67;--accent-50:#fdf5f0;--accent-100:#fbe8da;--accent-300:#efa97e;--accent-500:#d4703a;--accent-700:#964627;--neutral-100:#f0eee7;--neutral-200:#e5e3dc;--neutral-400:#a19d90;--neutral-600:#5a564c;--neutral-800:#2e2b25;--success:#4a8c5c;--warning:#c4942a;--danger:#c0392b;--info:#3a7ca5;--font-display:"Optima","Times New Roman",serif;--font-ui:"Open Sauce Sans",system-ui,sans-serif;--shadow-xs:0 1px 2px rgba(85,77,51,.06);--shadow-sm:0 1px 3px rgba(85,77,51,.1);--shadow-md:0 4px 8px rgba(85,77,51,.08);--shadow-lg:0 12px 24px rgba(85,77,51,.12);--radius-md:8px;--radius-lg:12px;--radius-xl:16px;--radius-full:9999px;--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-6:24px;--sp-8:32px;--sp-12:48px;--text-2xs:.625rem;--text-xs:.75rem;--text-sm:.8125rem;--text-md:1rem;--text-lg:1.125rem;--text-xl:1.35rem;--text-2xl:1.62rem;--text-4xl:2.333rem}

.badge-brand{background:var(--brand-100);color:var(--brand-900)}.badge-accent{background:var(--accent-100);color:var(--accent-900)}.badge-cream{background:white;color:var(--brand-700);border:1px solid var(--brand-300)}.badge-success{background:#e8f5e9;color:var(--success)}.badge-warning{background:#fff3e0;color:var(--warning)}.badge-neutral{background:var(--neutral-100);color:var(--neutral-600)}.badge-info{background:#e3f2fd;color:var(--info)}

.tag-chip-remove{cursor:pointer;margin-left:4px;color:var(--cream-700)}
.tag-chip-remove:hover{color:var(--danger)}
.banner{position:fixed;top:var(--sp-3);left:50%;transform:translateX(-50%);background:white;border:1px solid var(--neutral-200);border-radius:var(--radius-lg);padding:var(--sp-3) var(--sp-4);box-shadow:var(--shadow-md);font-size:var(--text-sm);color:var(--brand-700);z-index:80;display:none;align-items:center;gap:var(--sp-2)}
.banner.show{display:flex}
.select-bar{position:fixed;bottom:var(--sp-6);left:50%;transform:translateX(-50%);background:var(--brand-700);color:white;padding:var(--sp-3) var(--sp-6);border-radius:var(--radius-full);box-shadow:var(--shadow-lg);display:none;align-items:center;gap:var(--sp-3);z-index:60}
.select-bar.show{display:flex}
.select-bar button{padding:6px 16px;border-radius:var(--radius-md);border:none;background:white;color:var(--brand-700);font-weight:600;cursor:pointer;font-family:var(--font-ui);font-size:var(--text-sm)}
.select-bar button.btn-cancel{background:transparent;color:white;border:1px solid rgba(255,255,255,.3)}
.card.selected{outline:3px solid var(--accent-500);outline-offset:-3px}
.card.select-mode{cursor:pointer}
.card.select-mode .card-share{display:none}
.card-checkbox{position:absolute;top:var(--sp-2);right:var(--sp-2);width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--brand-700);font-weight:700;display:none}
.card.select-mode .card-checkbox{display:flex}
.card.selected .card-checkbox{background:var(--accent-500);color:white}
</style>
</head><body>
<div class="back-bar"><a class="back-home" href="/">← Banco de Referências</a></div>
<div class="container">
  <div class="header">
    <div>
      <h1 class="header-title">Banco Live</h1>
      <p style="margin:var(--sp-2) 0 0;color:var(--cream-700);font-size:var(--text-md);max-width:680px">Referências adicionadas pelo formulário. Aparecem aqui após processamento. <span class="refreshing"><span class="dot"></span>Atualização automática</span></p>
    </div>
    <div class="header-meta" id="stats"></div>
  </div>
  <div class="tabs-main">
    <button class="tab-main active" data-tipo="">Tudo</button>
    <button class="tab-main" data-tipo="post_fixado">Posts Fixados</button>
    <button class="tab-main" data-tipo="destaque">Destaques</button>
    <button class="tab-main" data-tipo="publicacao_avulsa">Publicações</button>
  </div>
  <div class="toolbar">
    <input type="search" class="input input-search" id="q" placeholder="Buscar perfil, caption, transcrição...">
    <select class="select" id="trilha"><option value="">Todas trilhas</option><option value="clinic">Clínica</option><option value="scale">Mentoria</option></select>
    <select class="select" id="etapa"><option value="">Todas etapas</option><option value="DESCOBERTA">Descoberta</option><option value="CONFIANCA">Confiança</option><option value="ACAO">Ação</option></select>
    <select class="select" id="periodo"><option value="">Qualquer data</option><option value="1h">Última hora</option><option value="24h">Últimas 24h</option><option value="hoje">Hoje</option><option value="7d">Últimos 7 dias</option><option value="30d">Últimos 30 dias</option><option value="custom">Personalizado…</option></select>
    <input type="date" class="input" id="dateFrom" style="display:none;max-width:140px">
    <input type="date" class="input" id="dateTo" style="display:none;max-width:140px">
    <select class="select" id="ordem"><option value="recente">Mais recentes</option><option value="antigo">Mais antigos</option></select>
    <button class="btn" id="reload">↻ Recarregar</button>
    <button class="btn" id="btnSelectMode" onclick="toggleSelectMode()">📊 Selecionar pra apresentação</button>
  </div>
  <div id="pendingBanner" class="banner"></div>
  <div id="selectBar" class="select-bar">
    <span><strong id="selectCount">0</strong> selecionada(s)</span>
    <button onclick="generatePresentation()">📥 Gerar PDF</button>
    <button class="btn-cancel" onclick="toggleSelectMode()">Cancelar</button>
  </div>
  <div id="results"><div class="loading">Carregando do banco...</div></div>
  <div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-player" id="modalPlayer"></div>
      <div class="modal-side">
        <div class="modal-head">
          <h3 class="modal-title" id="modalTitle">—</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>
  <button class="btn-add" onclick="window.location='/trilhas#open-form'">+ Adicionar referência</button>
  <div class="footer">Atualiza automaticamente a cada 30 segundos</div>
</div>
<script>
const SUPABASE_URL = "https://knusqfbvhsqworzyhvip.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtudXNxZmJ2aHNxd29yenlodmlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ4NTg3MjcsImV4cCI6MjA3MDQzNDcyN30.f-m7TlmCoccBpUxLZhA4P5kr2lWBGtRIv6inzInAKCo";

const TIPO_BADGE = {'Apresentação':'badge-brand','Prova Social':'badge-success','Oferta/CTA':'badge-accent','Quem Sou':'badge-brand','Resultados':'badge-success','Metodologia/Produto':'badge-info','FAQ':'badge-warning','Dicas Grátis':'badge-cream','Mentoria/Produto/Oferta':'badge-accent','Bastidores':'badge-neutral','Específico do Nicho':'badge-neutral','Indefinido':'badge-neutral'};
const ETAPA_LABEL = {DESCOBERTA:'Descoberta',CONFIANCA:'Confiança',ACAO:'Ação'};

let DATA = [];
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtNum(n){const x=parseInt(n||0);return x?x.toLocaleString('pt-BR'):'';}
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'agora';
  if (diff < 3600) return 'há ' + Math.floor(diff/60) + ' min';
  if (diff < 86400) return 'há ' + Math.floor(diff/3600) + 'h';
  if (diff < 172800) return 'ontem ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if (diff < 604800) return Math.floor(diff/86400) + ' dias';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}) + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function isNew(iso){ if(!iso) return false; return (Date.now() - new Date(iso).getTime()) < 86400000; }
function periodoCutoff(p){
  const now = Date.now();
  if (p === '1h') return now - 3600000;
  if (p === '24h') return now - 86400000;
  if (p === 'hoje') { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); }
  if (p === '7d') return now - 7*86400000;
  if (p === '30d') return now - 30*86400000;
  if (p === 'custom') {
    const fromV = document.getElementById('dateFrom').value;
    const toV = document.getElementById('dateTo').value;
    if (!fromV || !toV) return null;
    const from = new Date(fromV + 'T00:00:00').getTime();
    const to = new Date(toV + 'T23:59:59').getTime();
    return { from, to };
  }
  return null;
}

async function load(){
  const url = `${SUPABASE_URL}/rest/v1/v_referencias_publicas?select=*&order=created_at.desc&limit=500`;
  try {
    const r = await fetch(url, { headers:{ apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON }});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    DATA = await r.json();
    render();
    if (typeof checkPendingComplete === 'function') checkPendingComplete();
  } catch (e) {
    document.getElementById('results').innerHTML = `<div class="error">Falha ao carregar do banco: ${escapeHtml(e.message)}</div>`;
  }
}

function render(){
  const tipo = document.querySelector('.tab-main.active').dataset.tipo;
  const trilha = document.getElementById('trilha').value;
  const etapa = document.getElementById('etapa').value;
  const periodo = document.getElementById('periodo').value;
  const ordem = document.getElementById('ordem').value;
  const q = document.getElementById('q').value.trim().toLowerCase();
  const cutoff = periodoCutoff(periodo);
  let rows = DATA.filter(r => {
    if (tipo && r.tipo_artefato !== tipo) return false;
    if (trilha && r.trilha !== trilha) return false;
    if (etapa && r.etapa_funil !== etapa) return false;
    if (cutoff) {
      const t = r.created_at ? new Date(r.created_at).getTime() : 0;
      if (typeof cutoff === 'object') {
        if (t < cutoff.from || t > cutoff.to) return false;
      } else {
        if (t < cutoff) return false;
      }
    }
    if (q && !((r.perfil||'')+' '+(r.caption||'')+' '+(r.resumo||'')+' '+(r.transcricao||'')+' '+((r.tags||[]).join(' '))).toLowerCase().includes(q)) return false;
    return true;
  });
  rows.sort((a,b) => {
    const ta = a.created_at ? new Date(a.created_at).getTime() : 0;
    const tb = b.created_at ? new Date(b.created_at).getTime() : 0;
    return ordem === 'antigo' ? ta - tb : tb - ta;
  });
  // Stats
  const stats = document.getElementById('stats');
  const counts = rows.reduce((a,r)=>{a[r.tipo_artefato]=(a[r.tipo_artefato]||0)+1;return a;},{});
  stats.innerHTML = `
    <div class="stat"><span class="stat-value">${rows.length}</span><span class="stat-label">Total</span></div>
    <div class="stat"><span class="stat-value">${counts.post_fixado||0}</span><span class="stat-label">Fixados</span></div>
    <div class="stat"><span class="stat-value">${counts.destaque||0}</span><span class="stat-label">Destaques</span></div>
    <div class="stat"><span class="stat-value">${counts.publicacao_avulsa||0}</span><span class="stat-label">Avulsas</span></div>`;

  if (!rows.length){ document.getElementById('results').innerHTML = '<div class="empty">Nenhuma referência nesse filtro. Tenta ampliar o período ou limpa busca.</div>'; return; }

  const cardHtml = (r) => {
    const thumb = r.thumb_url || '';
    const isVideo = r.tipo_artefato==='post_fixado' || r.tipo_artefato==='publicacao_avulsa';
    const novo = isNew(r.created_at);
    const tags = (r.tags || []).slice(0, 3);
    const selectedCls = SELECTED.has(r.id) ? ' selected' : '';
    const modeCls = SELECT_MODE ? ' select-mode' : '';
    return `<div class="card${modeCls}${selectedCls}" data-card-id="${r.id}" onclick="onCardClick(${r.id})">
      <div class="card-thumb ${thumb?'':'card-thumb-empty'}" style="${thumb?`background-image:url('${thumb}')`:''}">
        <div class="badge-overlay">
          <span class="badge ${TIPO_BADGE[r.tipo_estrategico]||'badge-neutral'}">${escapeHtml(r.tipo_estrategico||'—')}</span>
          <span style="display:flex;gap:var(--sp-1)">
            ${novo?'<span class="badge" style="background:var(--accent-500);color:white">NOVO</span>':''}
            ${r.posicao?`<span class="badge badge-cream">Pos ${r.posicao}</span>`:''}
          </span>
        </div>
        ${thumb&&isVideo?'<div class="play">▶</div>':''}
        ${!thumb?'sem prévia':''}
        <div class="card-checkbox">${SELECTED.has(r.id) ? '✓' : ''}</div>
        <button class="card-share" onclick="event.stopPropagation();shareCard(${r.id})" title="Copiar link da referência">🔗</button>
      </div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:baseline;gap:var(--sp-2)">
          <span style="font-size:var(--text-2xs);color:var(--accent-500);font-weight:700;text-transform:uppercase;letter-spacing:.06em">@${escapeHtml(r.perfil||'')}</span>
          <span style="font-size:var(--text-2xs);color:var(--cream-700);white-space:nowrap" title="${r.created_at||''}">${fmtDate(r.created_at)}</span>
        </div>
        <h4 class="card-title">${escapeHtml(r.resumo||'—')}</h4>
        <div class="card-caption">${escapeHtml(r.caption||'')}</div>
        ${tags.length?`<div style="display:flex;gap:4px;flex-wrap:wrap">${tags.map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}</div>`:''}
        <div class="card-foot">
          <span>${[fmtNum(r.likes)?'♥ '+fmtNum(r.likes):'',fmtNum(r.comments)?'💬 '+fmtNum(r.comments):'',fmtNum(r.views)?'▶ '+fmtNum(r.views):''].filter(x=>x).join(' · ')}</span>
          <span class="badge badge-cream">${ETAPA_LABEL[r.etapa_funil]||'—'}</span>
        </div>
      </div>
    </div>`;
  };

  const timeline = !!periodo || ordem === 'antigo' || q;
  let h = '';
  if (timeline) {
    h += '<div class="grid">' + rows.map(cardHtml).join('') + '</div>';
  } else {
    const byPerfil = {};
    rows.forEach(r=>{(byPerfil[r.perfil]=byPerfil[r.perfil]||[]).push(r);});
    Object.keys(byPerfil).sort().forEach(p=>{
      const items = byPerfil[p];
      const trilhaLabel = items[0].trilha;
      h += `<h2 class="section-h2"><span class="eyebrow">@</span>${escapeHtml(p)} <span class="badge ${trilhaLabel==='clinic'?'badge-success':'badge-accent'}">${trilhaLabel}</span> <span style="color:var(--cream-700);font-weight:400;font-family:var(--font-ui);font-size:var(--text-sm)">(${items.length})</span></h2>`;
      h += '<div class="grid">' + items.map(cardHtml).join('') + '</div>';
    });
  }
  document.getElementById('results').innerHTML = h;
}

const MUTATE_WEBHOOK = 'https://knusqfbvhsqworzyhvip.supabase.co/functions/v1/case-refs-mutate';
let CURRENT_REF_ID = null;

function openModal(id){
  const r = DATA.find(x=>x.id===id); if(!r) return;
  CURRENT_REF_ID = id;
  document.getElementById('modalTitle').textContent = `@${r.perfil} — ${r.tipo_estrategico||r.tipo_artefato}`;
  if (r.shortcode){
    document.getElementById('modalPlayer').innerHTML = `<iframe src="https://www.instagram.com/p/${r.shortcode}/embed/captioned/" allow="encrypted-media" scrolling="no"></iframe>`;
  } else {
    document.getElementById('modalPlayer').innerHTML = `<div style="color:var(--cream-500);padding:var(--sp-6);text-align:center">Sem post associado (destaque)</div>`;
  }
  let body = `<div style="display:flex;gap:var(--sp-2);flex-wrap:wrap;margin-bottom:var(--sp-3)">
    <span class="badge badge-cream">${r.trilha}</span>
    <span class="badge ${TIPO_BADGE[r.tipo_estrategico]||'badge-neutral'}">${escapeHtml(r.tipo_estrategico||'—')}</span>
    <span class="badge badge-brand">${ETAPA_LABEL[r.etapa_funil]||'—'}</span>
    ${r.tem_transcricao?'<span class="badge badge-success">Transcrita</span>':''}

  if (r.caption) body += `<div class="modal-section"><h4>Caption</h4><div style="font-size:var(--text-sm);white-space:pre-wrap">${escapeHtml(r.caption)}</div></div>`;
  if (r.transcricao) body += `<div class="modal-section"><h4>Transcrição ${r.language_code?`[${r.language_code}]`:''} <button class="btn-mini" onclick="copyTranscription(${id})">📋 Copiar</button></h4><div class="modal-transcript">${escapeHtml(r.transcricao)}</div></div>`;
  body += `<div class="modal-section" id="tagsSection">
    <h4 style="display:flex;justify-content:space-between;align-items:center">
      <span>Tags</span>
    </h4>
    <div id="tagsView">${renderTagChips(r)}</div>
  </div>`;
  body += `<div class="modal-section" id="notesSection">
    <h4 style="display:flex;justify-content:space-between;align-items:center">
      <span>Notas</span>
      <button class="btn-mini" onclick="editNotes()">✏️ Editar</button>
    </h4>
    <div id="notesView" style="font-size:var(--text-sm);color:var(--cream-700);white-space:pre-wrap;min-height:1.4em">${escapeHtml(r.notas||'(sem notas)')}</div>
  </div>`;
  body += `<div class="modal-section" style="display:flex;justify-content:space-between;gap:var(--sp-2);border-top:1px solid var(--neutral-200);padding-top:var(--sp-3);margin-top:var(--sp-4)">
    <button class="btn" onclick="shareCard(${r.id})">🔗 Compartilhar link</button>
    <button class="btn-danger" onclick="deleteRef()">🗑️ Excluir referência</button>
  </div>`;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}

function editNotes() {
  const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(!r) return;
  const sec = document.getElementById('notesSection');
  sec.innerHTML = `
    <h4>Notas</h4>
    <textarea id="notesEdit" style="width:100%;min-height:80px;padding:var(--sp-2);border:1px solid var(--neutral-200);border-radius:var(--radius-md);font-family:var(--font-ui);font-size:var(--text-sm);resize:vertical">${escapeHtml(r.notas||'')}</textarea>
    <div style="display:flex;gap:var(--sp-2);margin-top:var(--sp-2);justify-content:flex-end">
      <button class="btn" onclick="cancelEditNotes()">Cancelar</button>
      <button class="btn btn-primary" id="btnSaveNotes" onclick="saveNotes()">Salvar</button>
    </div>`;
  document.getElementById('notesEdit').focus();
}

function cancelEditNotes() {
  const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(!r) return;
  const sec = document.getElementById('notesSection');
  sec.innerHTML = `
    <h4 style="display:flex;justify-content:space-between;align-items:center">
      <span>Notas</span>
      <button class="btn-mini" onclick="editNotes()">✏️ Editar</button>
    </h4>
    <div id="notesView" style="font-size:var(--text-sm);color:var(--cream-700);white-space:pre-wrap;min-height:1.4em">${escapeHtml(r.notas||'(sem notas)')}</div>`;
}

async function saveNotes() {
  const txt = document.getElementById('notesEdit').value;
  const btn = document.getElementById('btnSaveNotes');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    const res = await fetch(MUTATE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ op: 'update_note', id: CURRENT_REF_ID, notas: txt })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(r) r.notas = txt;
    cancelEditNotes();
    showToast('Nota salva ✓');
    render();
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Salvar';
    showToast('Erro: ' + e.message);
  }
}

async function deleteRef() {
  const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(!r) return;
  const preview = (r.caption || r.resumo || '').slice(0, 80);
  if (!confirm(`Excluir referência de @${r.perfil}?\n\n"${preview}${preview.length>=80?'...':''}"\n\nEssa ação não pode ser desfeita pela interface.`)) return;
  try {
    const res = await fetch(MUTATE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ op: 'soft_delete', id: CURRENT_REF_ID })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = DATA.filter(x => x.id !== CURRENT_REF_ID);
    closeModal();
    showToast('Excluído ✓');
    render();
  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

function copyTranscription(id) {
  const r = DATA.find(x=>x.id===id); if(!r) return;
  const txt = r.transcricao || '';
  navigator.clipboard.writeText(txt).then(() => {
    showToast(`Copiado ✓ (${txt.length.toLocaleString('pt-BR')} caracteres)`);
  });
}

function shareCard(id) {
  const url = `${window.location.origin}/live#card=${id}`;
  navigator.clipboard.writeText(url).then(() => showToast('Link copiado ✓'));
}

// E3-S2 — Modo seleção + apresentação PDF
let SELECT_MODE = false;
let SELECTED = new Set();

function toggleSelectMode() {
  SELECT_MODE = !SELECT_MODE;
  if (!SELECT_MODE) SELECTED.clear();
  document.getElementById('selectBar').classList.toggle('show', SELECT_MODE);
  document.getElementById('btnSelectMode').textContent = SELECT_MODE ? '✕ Sair da seleção' : '📊 Selecionar pra apresentação';
  updateSelectCount();
  render();
}

function onCardClick(id) {
  if (!SELECT_MODE) { openModal(id); return; }
  if (SELECTED.has(id)) SELECTED.delete(id); else SELECTED.add(id);
  updateSelectCount();
  render();
}

function updateSelectCount() {
  document.getElementById('selectCount').textContent = SELECTED.size;
}

async function generatePresentation() {
  if (!SELECTED.size) { showToast('Selecione pelo menos 1 referência'); return; }
  const refs = [...SELECTED].map(id => DATA.find(r => r.id === id)).filter(Boolean);
  const titulo = prompt('Título da apresentação:', `Referências — ${new Date().toLocaleDateString('pt-BR')}`) || 'Apresentação';

  showToast(`Gerando PDF (${refs.length} slides)…`);
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', format: 'a4', unit: 'mm' });
    const W = 297, H = 210;

    // Capa
    pdf.setFillColor(85, 77, 51);
    pdf.rect(0, 0, W, H, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(32);
    pdf.text(titulo, W/2, H/2 - 10, { align: 'center', maxWidth: W - 40 });
    pdf.setFont('helvetica', 'normal');
    pdf.setFontSize(14);
    pdf.text(`${refs.length} referência${refs.length>1?'s':''} · ${new Date().toLocaleDateString('pt-BR')}`, W/2, H/2 + 8, { align: 'center' });
    pdf.setFontSize(10);
    pdf.setTextColor(200, 184, 147);
    pdf.text('Banco Case', W/2, H - 20, { align: 'center' });

    for (let i = 0; i < refs.length; i++) {
      const r = refs[i];
      pdf.addPage();

      // BG cream
      pdf.setFillColor(250, 249, 247);
      pdf.rect(0, 0, W, H, 'F');

      // Header bar
      pdf.setFillColor(85, 77, 51);
      pdf.rect(0, 0, W, 18, 'F');
      pdf.setTextColor(255, 255, 255);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(11);
      pdf.text(`@${r.perfil || '—'}`, 14, 12);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(9);
      pdf.text(`${(r.trilha === 'clinic' ? 'Clínica' : 'Mentoria')} · ${r.etapa_funil || '—'} · ${r.tipo_estrategico || '—'}`, W - 14, 12, { align: 'right' });

      // Thumb
      if (r.thumb_url) {
        try {
          const imgData = await loadImageAsDataURL(r.thumb_url);
          if (imgData) pdf.addImage(imgData, 'JPEG', 14, 26, 90, 90);
        } catch (e) {}
      } else {
        pdf.setFillColor(229, 227, 220);
        pdf.rect(14, 26, 90, 90, 'F');
        pdf.setTextColor(128, 122, 103);
        pdf.setFontSize(10);
        pdf.text('sem prévia', 59, 76, { align: 'center' });
      }

      // Resumo
      pdf.setTextColor(53, 48, 29);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(14);
      const resumoLines = pdf.splitTextToSize(r.resumo || r.caption || '—', W - 130);
      pdf.text(resumoLines.slice(0, 3), 114, 38);

      // Caption (200 chars)
      pdf.setTextColor(90, 86, 76);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(10);
      const captionShort = (r.caption || '').slice(0, 240);
      const captionLines = pdf.splitTextToSize(captionShort + (r.caption?.length > 240 ? '…' : ''), W - 130);
      pdf.text(captionLines.slice(0, 5), 114, 60);

      // Transcrição preview
      if (r.transcricao) {
        pdf.setFont('helvetica', 'italic');
        pdf.setFontSize(9);
        pdf.setTextColor(128, 122, 103);
        pdf.text('TRECHO DA TRANSCRIÇÃO', 114, 100);
        pdf.setFont('helvetica', 'normal');
        pdf.setFontSize(9);
        pdf.setTextColor(70, 65, 55);
        const trans = (r.transcricao || '').slice(0, 360);
        const transLines = pdf.splitTextToSize(trans + (r.transcricao.length > 360 ? '…' : ''), W - 130);
        pdf.text(transLines.slice(0, 8), 114, 108);
      }

      // Footer
      pdf.setDrawColor(229, 227, 220);
      pdf.line(14, H - 16, W - 14, H - 16);
      pdf.setFontSize(8);
      pdf.setTextColor(128, 122, 103);
      pdf.text(`${i+1} / ${refs.length}`, 14, H - 8);
      pdf.text(r.url || '', W - 14, H - 8, { align: 'right', maxWidth: 200 });
    }

    const filename = `${titulo.replace(/[^a-z0-9]/gi,'-').toLowerCase()}-${Date.now()}.pdf`;
    pdf.save(filename);
    showToast('PDF baixado ✓');
    toggleSelectMode();
  } catch (e) {
    console.error(e);
    showToast('Erro ao gerar PDF: ' + e.message);
  }
}

async function loadImageAsDataURL(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth || 400;
        canvas.height = img.naturalHeight || 400;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      } catch (e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

function renderTagChips(r) {
  const tags = r.tags || [];
  let html = '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">';
  tags.forEach(t => {
    html += `<span class="tag-chip">${escapeHtml(t)}<span class="tag-chip-remove" onclick="removeTag('${escapeHtml(t).replace(/'/g,"\\'")}')">×</span></span>`;
  });
  html += `<input type="text" id="tagInput" placeholder="+ tag" style="border:1px dashed var(--neutral-200);background:transparent;padding:2px 8px;font-size:var(--text-2xs);border-radius:var(--radius-full);outline:none;width:80px;font-family:var(--font-ui)" onkeydown="if(event.key==='Enter'){event.preventDefault();addTag(this.value);this.value='';}">`;
  html += '</div>';
  return html;
}

async function addTag(rawTag) {
  const tag = (rawTag || '').trim().toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9_-]/g,'');
  if (!tag) return;
  const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(!r) return;
  const cur = r.tags || [];
  if (cur.includes(tag)) { showToast('Tag já existe'); return; }
  const next = [...cur, tag];
  try {
    const res = await fetch(MUTATE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ op: 'update_tags', id: CURRENT_REF_ID, tags: next })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    r.tags = next;
    document.getElementById('tagsView').innerHTML = renderTagChips(r);
    showToast('Tag adicionada ✓');
    render();
  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

async function removeTag(tag) {
  const r = DATA.find(x=>x.id===CURRENT_REF_ID); if(!r) return;
  const next = (r.tags || []).filter(t => t !== tag);
  try {
    const res = await fetch(MUTATE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + SUPABASE_ANON },
      body: JSON.stringify({ op: 'update_tags', id: CURRENT_REF_ID, tags: next })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    r.tags = next;
    document.getElementById('tagsView').innerHTML = renderTagChips(r);
    showToast('Tag removida ✓');
    render();
  } catch (e) {
    showToast('Erro: ' + e.message);
  }
}

// Pending refs tracking (E2-S6)
const PENDING_KEY = 'case-refs:pending-ids';
let PENDING_IDS = new Set(JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'));

function savePending() { localStorage.setItem(PENDING_KEY, JSON.stringify([...PENDING_IDS])); }
function addPending(payload) {
  // Identifica por url+timestamp (sem id ainda)
  const key = (payload.url || '') + '|' + payload.created_at;
  PENDING_IDS.add(key);
  savePending();
  updatePendingBanner();
}
function updatePendingBanner() {
  const banner = document.getElementById('pendingBanner');
  if (!banner) return;
  if (!PENDING_IDS.size) { banner.classList.remove('show'); return; }
  banner.innerHTML = `⏳ <strong>${PENDING_IDS.size}</strong> referência(s) processando…`;
  banner.classList.add('show');
}
function checkPendingComplete() {
  if (!PENDING_IDS.size) return;
  // Considera pendente como "processado" se algum item recente apareceu nos últimos 10 min com mesma URL
  const recent = DATA.filter(r => r.created_at && (Date.now() - new Date(r.created_at).getTime()) < 10*60*1000);
  const completed = [];
  PENDING_IDS.forEach(key => {
    const url = key.split('|')[0];
    const match = recent.find(r => r.url === url || r.shortcode && url.includes(r.shortcode));
    if (match) {
      completed.push({ key, ref: match });
      PENDING_IDS.delete(key);
    }
  });
  if (completed.length) {
    savePending();
    updatePendingBanner();
    completed.forEach(c => {
      showToast(`✓ @${c.ref.perfil} processado`);
      if (Notification.permission === 'granted') {
        new Notification('case-refs', { body: `@${c.ref.perfil} pronto`, icon: c.ref.thumb_url || '/favicon.ico' });
      }
    });
  }
}
function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('modalPlayer').innerHTML='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

document.querySelectorAll('.tab-main').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-main').forEach(t=>t.classList.remove('active'));b.classList.add('active');render();}));
['q','trilha','etapa','periodo','ordem','dateFrom','dateTo'].forEach(id=>document.getElementById(id).addEventListener('input',render));
document.getElementById('periodo').addEventListener('change', e => {
  const isCustom = e.target.value === 'custom';
  document.getElementById('dateFrom').style.display = isCustom ? '' : 'none';
  document.getElementById('dateTo').style.display = isCustom ? '' : 'none';
  if (isCustom && !document.getElementById('dateTo').value) {
    const today = new Date().toISOString().slice(0,10);
    const lastWeek = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
    document.getElementById('dateFrom').value = lastWeek;
    document.getElementById('dateTo').value = today;
    render();
  }
});
document.getElementById('reload').addEventListener('click',load);

// Deep-link: abrir card específico via #card=ID
function openCardFromHash() {
  const m = (window.location.hash || '').match(/#card=(\d+)/);
  if (!m) return;
  const id = parseInt(m[1]);
  let tries = 0;
  const tryOpen = () => {
    if (DATA.find(r => r.id === id)) {
      openModal(id);
      const el = document.querySelector(`[data-card-id="${id}"]`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (tries++ < 30) {
      setTimeout(tryOpen, 200);
    } else {
      showToast('Referência não encontrada (pode ter sido excluída)');
    }
  };
  tryOpen();
}
window.addEventListener('hashchange', openCardFromHash);
window.addEventListener('load', openCardFromHash);
load();
setInterval(load, 30000);

updatePendingBanner();
if ('Notification' in window && Notification.permission === 'default' && PENDING_IDS.size) {
  Notification.requestPermission();
}
